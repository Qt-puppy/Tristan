name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

# 1. Shut down GitHub's Node 20 deprecation panic
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          
      # 2. Bypass the outdated HF plugin and use pure Git
      - name: Raw Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://kavo022:$HF_TOKEN@huggingface.co/spaces/kavo022/Tristan-Backend
          git push hf main --force
